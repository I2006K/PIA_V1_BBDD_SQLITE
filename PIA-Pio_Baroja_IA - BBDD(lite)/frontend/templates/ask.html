<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <aside class="side-menu">

        <a href="/pdf"><button class="aside-btn" >Pdfs Subidos</button></a>

        <div class="chatgpt-style">
